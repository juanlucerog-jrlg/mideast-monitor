
name: Update News Feed

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Fetch Reuters RSS
        run: |
          curl -s https://feeds.reuters.com/reuters/worldNews -o feed.xml

      - name: Convert RSS to JSON
        run: |
          node -e "
          const fs = require('fs');
          const xml = fs.readFileSync('feed.xml','utf8');
          const items = [...xml.matchAll(/<item>([\s\S]*?)<\/item>/g)];
          const news = items.slice(0,20).map(i=>{
            const title = i[1].match(/<title>(.*?)<\/title>/)?.[1] || '';
            const link = i[1].match(/<link>(.*?)<\/link>/)?.[1] || '';
            return { title, link };
          });
          fs.writeFileSync('news.json', JSON.stringify(news, null, 2));
          "

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add news.json
          git commit -m "Auto update news" || echo "No changes"
          git push
