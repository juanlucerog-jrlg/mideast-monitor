
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORIENTE MEDIO INTEL — Refresh Manual</title>

<style>
body {
    background:#0b0f14;
    color:#e6edf3;
    font-family:Arial, sans-serif;
    margin:0;
    padding:20px;
}

h1 { margin-bottom:10px; }

button {
    background:#4a9eff;
    border:none;
    padding:10px 15px;
    color:white;
    font-weight:bold;
    cursor:pointer;
    border-radius:4px;
}

button:hover { background:#3b85e0; }

.alert {
    background:#e8412a;
    padding:10px;
    margin:15px 0;
    display:none;
    font-weight:bold;
    border-radius:4px;
}

.news-card {
    background:#121922;
    padding:15px;
    border-radius:6px;
    margin-bottom:15px;
    border-left:4px solid #4a9eff;
}

.news-card a {
    color:#4a9eff;
    text-decoration:none;
}

.news-card a:hover { text-decoration:underline; }

.meta {
    font-size:12px;
    opacity:0.6;
    margin-bottom:6px;
}
</style>
</head>

<body>

<h1>🛰 ORIENTE MEDIO INTEL</h1>

<button onclick="refreshNews()">🔄 REFRESH</button>

<div class="alert" id="newAlert">🚨 NUEVAS NOTICIAS DETECTADAS — Presiona REFRESH</div>

<div id="news">Cargando noticias...</div>

<script>
const rssURL = "https://feeds.reuters.com/reuters/worldNews";
let lastTitles = [];

async function fetchNews() {
    const apiURL = "https://api.rss2json.com/v1/api.json?rss_url=" + encodeURIComponent(rssURL);
    const response = await fetch(apiURL);
    const data = await response.json();
    return data.items || [];
}

function renderNews(items) {
    const container = document.getElementById("news");
    container.innerHTML = "";

    items.slice(0,20).forEach(item => {
        const card = document.createElement("div");
        card.className = "news-card";

        card.innerHTML = `
            <div class="meta">Fuente: Reuters</div>
            <div><strong>${item.title}</strong></div>
            <div><a href="${item.link}" target="_blank">Leer noticia completa</a></div>
        `;

        container.appendChild(card);
    });
}

async function refreshNews() {
    document.getElementById("newAlert").style.display = "none";
    const items = await fetchNews();

    const currentTitles = items.map(i => i.title);

    if (lastTitles.length > 0) {
        const hasNew = currentTitles.some(title => !lastTitles.includes(title));
        if (hasNew) {
            document.getElementById("newAlert").style.display = "block";
        }
    }

    lastTitles = currentTitles;
    renderNews(items);
}

refreshNews();
</script>

</body>
</html>
