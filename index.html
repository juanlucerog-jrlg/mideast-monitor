
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORIENTE MEDIO INTEL — Monitor Real</title>
<style>
body {
    background: #0b0f14;
    color: #e6edf3;
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 20px;
}
h1 {
    margin-bottom: 10px;
}
.news-card {
    background: #121922;
    padding: 15px;
    border-radius: 6px;
    margin-bottom: 12px;
    border-left: 4px solid #4a9eff;
}
.news-card a {
    color: #4a9eff;
    text-decoration: none;
}
.news-card a:hover {
    text-decoration: underline;
}
.meta {
    font-size: 12px;
    opacity: 0.7;
    margin-bottom: 6px;
}
</style>
</head>
<body>

<h1>🛰 ORIENTE MEDIO INTEL — Monitor Real</h1>
<div id="news">Cargando noticias...</div>

<script>
async function loadRealNews() {
    try {
        const response = await fetch("news.json");
        const data = await response.json();

        const container = document.getElementById("news");
        container.innerHTML = "";

        data.slice(0, 20).forEach(item => {
            const card = document.createElement("div");
            card.className = "news-card";

            card.innerHTML = `
                <div class="meta">Fuente RSS</div>
                <div><strong>${item.title}</strong></div>
                <div><a href="${item.link}" target="_blank">Leer en fuente original</a></div>
            `;

            container.appendChild(card);
        });

    } catch (error) {
        document.getElementById("news").innerText = "Error cargando noticias.";
    }
}

loadRealNews();
setInterval(loadRealNews, 300000);
</script>

</body>
</html>
